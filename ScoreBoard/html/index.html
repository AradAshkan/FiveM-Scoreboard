<!DOCTYPE html>
<html lang="fa" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta author="Arad Ashkan" description="https://github.com/aradashkan">
    <title>Modern Scoreboard | FiveM</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="scoreboard" class="scoreboard hidden">
        <div class="scoreboard-container">
            <!-- Header -->
            <div class="scoreboard-header">
                <div class="server-logo">
                    <div class="logo-icon">
                        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="url(#gradient)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M2 17L12 22L22 17" stroke="url(#gradient)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M2 12L12 17L22 12" stroke="url(#gradient)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                            <defs>
                                <linearGradient id="gradient" x1="2" y1="2" x2="22" y2="22" gradientUnits="userSpaceOnUse">
                                    <stop stop-color="#dc2626"/>
                                    <stop offset="1" stop-color="#991b1b"/>
                                </linearGradient>
                            </defs>
                        </svg>
                    </div>
                    <div class="logo-text">
                        <h2>ROLEPLAY</h2>
                        <span>SERVER</span>
                    </div>
                </div>
                <div class="server-stats">
                    <div class="stat">
                        <span class="stat-label">Players Online</span>
                        <span class="stat-value" id="playerCount">0/0</span>
                    </div>
                    <div class="stat">
                        <span class="stat-label">Uptime</span>
                        <span class="stat-value" id="uptime">00:00:00</span>
                    </div>
                </div>
            </div>

            <!-- Search -->
            <div class="controls">
                <div class="search-box">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"/>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                    </svg>
                    <input type="text" id="searchInput" placeholder="Search players...">
                </div>
            </div>

            <!-- Players Table -->
            <div class="table-wrapper">
                <table class="players-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Player</th>
                            <th>Job</th>
                            <th>Ping</th>
                        </thead>
                    <tbody id="playersList">
                        <!-- Dynamic content -->
                    </tbody>
                </table>
            </div>

            <!-- Footer -->
            <div class="scoreboard-footer">
                <span>Press <kbd>F10</kbd> to close</span>
                <span>© 2025 Modern Scoreboard</span>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
